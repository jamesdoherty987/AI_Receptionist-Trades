services:
  - type: web
    name: ai-receptionist-backend
    runtime: python
    plan: starter  # Paid plan - no sleep, better performance
    buildCommand: pip install -r requirements.txt
    pythonVersion: 3.12.7
    startCommand: uvicorn src.server:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 120 --proxy-headers --limit-concurrency 100 --backlog 1024
    healthCheckPath: /health
    autoDeploy: true
    # Paid tier benefits: no cold starts, persistent connections, more memory
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-receptionist-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: FRONTEND_URL
        value: https://www.bookedforyou.info
      - key: PUBLIC_URL
        sync: false
      - key: GOOGLE_CALENDAR_API_KEY
        sync: false
      - key: GOOGLE_CALENDAR_CREDENTIALS
        sync: false
      - key: GOOGLE_CALENDAR_TOKEN
        sync: false
      - key: GOOGLE_CALENDAR_ID
        value: primary
      - key: CALENDAR_TIMEZONE
        value: Europe/Dublin
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: CHAT_MODEL
        value: gpt-4o-mini
      - key: TTS_PROVIDER
        value: elevenlabs
      - key: ELEVENLABS_VOICE_ID
        value: pNInz6obpgDQGcFmaJgB

databases:
  - name: ai-receptionist-db
    plan: starter  # Paid plan - more connections, better performance, daily backups
    databaseName: ai_receptionist
    user: ai_receptionist_user
