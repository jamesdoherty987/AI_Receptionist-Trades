<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 68 68" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0ea5e9" flood-opacity="0.35"/>
    </filter>
    <filter id="whiteGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feFlood flood-color="white" flood-opacity="0.6"/>
      <feComposite in2="blur1" operator="in" result="glow1"/>
      <feGaussianBlur stdDeviation="5" in="SourceGraphic" result="blur2"/>
      <feFlood flood-color="white" flood-opacity="0.3"/>
      <feComposite in2="blur2" operator="in" result="glow2"/>
      <feMerge>
        <feMergeNode in="glow2"/>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Circular background with drop shadow -->
  <circle cx="34" cy="34" r="28" fill="url(#grad)" filter="url(#shadow)"/>
  <!-- Smaller rounded bolt with white glow -->
  <path d="M38 14 L24 36 L32 36 L29 54 L46 32 L38 32 Z" fill="white" stroke="white" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" filter="url(#whiteGlow)"/>
</svg>
