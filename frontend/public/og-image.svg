<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0f0f2e"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0ea5e9" flood-opacity="0.4"/>
    </filter>
    <filter id="whiteGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur1"/>
      <feFlood flood-color="white" flood-opacity="0.5"/>
      <feComposite in2="blur1" operator="in" result="glow1"/>
      <feMerge>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo circle -->
  <circle cx="600" cy="190" r="70" fill="url(#brandGrad)" filter="url(#shadow)"/>
  <!-- Lightning bolt from logo -->
  <path d="M610 130 L582 192 L598 192 L592 250 L626 188 L610 188 Z" fill="white" stroke="white" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" filter="url(#whiteGlow)"/>

  <!-- Brand name — big and clear -->
  <text x="600" y="340" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="80" font-weight="800" fill="white" letter-spacing="-2">
    BookedForYou
  </text>

  <!-- Tagline -->
  <text x="600" y="410" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="400" fill="url(#brandGrad)">
    AI Receptionist for Tradespeople
  </text>

  <!-- URL -->
  <text x="600" y="530" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500" fill="#94a3b8">
    bookedforyou.ie
  </text>
</svg>
