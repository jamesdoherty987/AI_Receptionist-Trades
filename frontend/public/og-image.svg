<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0f0f2e"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>

    <!-- Brand gradient for text -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>

    <!-- Glow gradient for orbs -->
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient glow orbs -->
  <ellipse cx="200" cy="150" rx="300" ry="250" fill="url(#glowBlue)"/>
  <ellipse cx="1000" cy="500" rx="350" ry="280" fill="url(#glowPink)"/>
  <ellipse cx="600" cy="350" rx="250" ry="200" fill="url(#glowPurple)"/>

  <!-- Decorative line accents -->
  <line x1="80" y1="180" x2="80" y2="450" stroke="url(#brandGrad)" stroke-width="2" opacity="0.4"/>
  <line x1="1120" y1="180" x2="1120" y2="450" stroke="url(#brandGrad)" stroke-width="2" opacity="0.4"/>

  <!-- Top accent bar -->
  <rect x="400" y="100" width="400" height="3" rx="1.5" fill="url(#brandGrad)" opacity="0.6"/>

  <!-- Lightning bolt icon -->
  <g transform="translate(555, 140)">
    <polygon points="45,0 15,40 35,40 25,70 55,30 35,30" fill="url(#brandGrad)"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="265" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-1">
    BookedForYou
  </text>

  <!-- Tagline -->
  <text x="600" y="330" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="400" fill="url(#brandGrad)">
    AI Receptionist for Tradespeople
  </text>

  <!-- Subtitle -->
  <text x="600" y="385" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="300" fill="#94a3b8">
    Never miss a call. Never lose a job.
  </text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="195" y="430" width="180" height="40" rx="20" fill="rgba(14,165,233,0.12)" stroke="#0ea5e9" stroke-width="1" opacity="0.8"/>
  <text x="245" y="456" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#0ea5e9">📞 24/7 AI Calls</text>

  <!-- Pill 2 -->
  <rect x="405" y="430" width="180" height="40" rx="20" fill="rgba(139,92,246,0.12)" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
  <text x="443" y="456" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#8b5cf6">📅 Auto Booking</text>

  <!-- Pill 3 -->
  <rect x="615" y="430" width="190" height="40" rx="20" fill="rgba(236,72,153,0.12)" stroke="#ec4899" stroke-width="1" opacity="0.8"/>
  <text x="647" y="456" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#ec4899">👥 CRM Built-in</text>

  <!-- Pill 4 -->
  <rect x="835" y="430" width="170" height="40" rx="20" fill="rgba(14,165,233,0.12)" stroke="#0ea5e9" stroke-width="1" opacity="0.8"/>
  <text x="876" y="456" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#0ea5e9">💰 Invoicing</text>

  <!-- CTA line -->
  <text x="600" y="530" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="white" opacity="0.9">
    Start your free 14-day trial → bookedforyou.ie
  </text>

  <!-- Bottom accent bar -->
  <rect x="400" y="560" width="400" height="3" rx="1.5" fill="url(#brandGrad)" opacity="0.6"/>

  <!-- Corner decorations -->
  <circle cx="100" cy="80" r="4" fill="#0ea5e9" opacity="0.5"/>
  <circle cx="130" cy="80" r="3" fill="#ec4899" opacity="0.4"/>
  <circle cx="155" cy="80" r="2" fill="#8b5cf6" opacity="0.3"/>

  <circle cx="1100" cy="80" r="4" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="1070" cy="80" r="3" fill="#ec4899" opacity="0.4"/>
  <circle cx="1045" cy="80" r="2" fill="#0ea5e9" opacity="0.3"/>

  <circle cx="100" cy="550" r="4" fill="#ec4899" opacity="0.5"/>
  <circle cx="130" cy="550" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="155" cy="550" r="2" fill="#0ea5e9" opacity="0.3"/>

  <circle cx="1100" cy="550" r="4" fill="#0ea5e9" opacity="0.5"/>
  <circle cx="1070" cy="550" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="1045" cy="550" r="2" fill="#ec4899" opacity="0.3"/>
</svg>
