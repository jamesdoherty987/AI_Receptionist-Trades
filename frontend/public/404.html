<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — BookedForYou</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a1a;
      color: #e2e8f0;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    h1 { font-size: 6rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h2 { font-size: 1.5rem; margin: 0.5rem 0 1rem; color: #94a3b8; font-weight: 400; }
    a {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>This page doesn't exist</h2>
    <p>The page you're looking for may have been moved or no longer exists.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
